name: RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:

      - name: Configure Core RDP Settings
        run: |
          Write-Host "=== CONFIG RDP ==="

          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force

          netsh advfirewall firewall delete rule name="RDP-Tailscale"
          netsh advfirewall firewall add rule name="RDP-Tailscale" dir=in action=allow protocol=TCP localport=3389

          Restart-Service -Name TermService -Force

          Write-Host "RDP ENABLED!"

      - name: Create RDP User
        run: |
          Write-Host "=== CREATE USER ==="

          Add-Type -AssemblyName System.Security

          $charSet = @{
              Upper   = [char[]](65..90)
              Lower   = [char[]](97..122)
              Number  = [char[]](48..57)
              Special = ([char[]](33..47) + [char[]](58..64) + [char[]](91..96) + [char[]](123..126))
          }

          $rawPassword = @()
          $rawPassword += $charSet.Upper | Get-Random -Count 3
          $rawPassword += $charSet.Lower | Get-Random -Count 3
          $rawPassword += $charSet.Number | Get-Random -Count 3
          $rawPassword += $charSet.Special | Get-Random -Count 3

          $password = -join ($rawPassword | Sort-Object { Get-Random })
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force

          if (-not (Get-LocalUser -Name "RDP" -ErrorAction SilentlyContinue)) {
              New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires
          }

          Add-LocalGroupMember -Group "Administrators" -Member "RDP" -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP" -ErrorAction SilentlyContinue

          echo "RDP_USER=RDP" >> $env:GITHUB_ENV
          echo "RDP_PASS=$password" >> $env:GITHUB_ENV

          Write-Host "USER CREATED!"

      - name: Install Tailscale
        run: |
          Write-Host "=== INSTALL TAILSCALE ==="

          $url = "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi"
          $file = "$env:TEMP\tailscale.msi"

          Invoke-WebRequest -Uri $url -OutFile $file
          Start-Process msiexec.exe -ArgumentList "/i `"$file`" /quiet /norestart" -Wait
          Remove-Item $file -Force

          Write-Host "TAILSCALE INSTALLED!"

      - name: Connect Tailscale
        run: |
          Write-Host "=== CONNECT TAILSCALE ==="

          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=rdp-$env:GITHUB_RUN_ID

          Start-Sleep -Seconds 10

          $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4

          if (-not $ip) {
              Write-Error "FAILED GET IP"
              exit 1
          }

          echo "RDP_IP=$ip" >> $env:GITHUB_ENV

          Write-Host "IP: $ip"

      - name: Show RDP Info
        run: |
          Write-Host "========================"
          Write-Host " RDP READY "
          Write-Host "========================"
          Write-Host "IP      : $env:RDP_IP"
          Write-Host "USER    : $env:RDP_USER"
          Write-Host "PASS    : $env:RDP_PASS"
          Write-Host "========================"

      - name: Keep Alive
        run: |
          Write-Host "=== RUNNING ==="
          while ($true) {
              Write-Host "RDP AKTIF $(Get-Date)"
              Start-Sleep -Seconds 300
          }
